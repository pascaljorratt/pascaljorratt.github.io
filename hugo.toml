baseURL = 'https://pascaljorratt.github.io/'
locale = 'es-CL'
title = 'Blog de análisis y opinión'
theme = 'not-much'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
theme = "auto"
palette = "eink"
showThemeNotice = true
showPostsSummary = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "home"
    title = "Home"
    url = "/"
    weight = 1
  
  [[menu.main]]
    identifier = "publicaciones"
    name = "publicaciones"
    title = "publicaciones"
    url = "/posts"
    weight = 3
  
  [[menu.main]]
    identifier = "sobre mí"
    name = "sobre mí"
    title = "sobre mí"
    url = "/about"
    weight = 2
  
  [[menu.main]]
    identifier = "tags"
    name = "tags"
    title = "tags"
    url = "/tags"
    weight = 4

defaultContentLanguage = "es"

[languages]
  [languages.es]
    languageName = "Español"
    weight = 1
    
  [languages.en]
    languageName = "English"
    weight = 2