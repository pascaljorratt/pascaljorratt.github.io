baseURL = 'https://pascaljorratt.github.io/'
locale = 'es-CL'
title = 'Pascal Jorratt'
theme = 'not-much'

[markup]
  [markup.goldmark]
    unsafe = false
  [markup.highlight]
    style = "monokai"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[params]
theme = "auto"
palette = "eink"
showThemeNotice = true
showPostsSummary = true

